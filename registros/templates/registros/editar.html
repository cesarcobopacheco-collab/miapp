{% extends "registros/base.html" %}

{% block contenido %}
<h2 class="mb-4">Editar Registro</h2>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{ registro.nombre }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea name="descripcion" class="form-control" rows="3" required>{{ registro.descripcion }}</textarea>
    </div>
    <button type="submit" class="btn btn-success">Guardar cambios</button>
    <a href="{% url 'lista' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
