{% extends "registros/base.html" %}

{% block contenido %}
<h2 class="mb-4">Editar Registro</h2>

<form method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Número</label>
            <input type="number" name="numero" class="form-control" value="{{ registro.numero }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Código</label>
            <input type="text" name="codigo" class="form-control" value="{{ registro.codigo }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Chip</label>
            <input type="text" name="chip" class="form-control" value="{{ registro.chip }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Sexo</label>
            <select name="sexo" class="form-select">
                <option value="M" {% if registro.sexo == 'M' %}selected{% endif %}>Macho</option>
                <option value="H" {% if registro.sexo == 'H' %}selected{% endif %}>Hembra</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Raza</label>
            <select name="raza" class="form-select">
                <option value="">-- Seleccionar --</option>
                <option value="ANG" {% if registro.raza == 'ANG' %}selected{% endif %}>ANG - Angus</option>
                <option value="BRA" {% if registro.raza == 'BRA' %}selected{% endif %}>BRA - Brahman</option>
                <option value="BR" {% if registro.raza == 'BR' %}selected{% endif %}>BR - Brangus</option>
                <option value="NEL" {% if registro.raza == 'NEL' %}selected{% endif %}>NEL - Nelore</option>
                <option value="CHA" {% if registro.raza == 'CHA' %}selected{% endif %}>CHA - Charolais</option>
                <option value="SIM" {% if registro.raza == 'SIM' %}selected{% endif %}>SIM - Simmental</option>
                <option value="GIR" {% if registro.raza == 'GIR' %}selected{% endif %}>GIR - Gir</option>
                <option value="HER" {% if registro.raza == 'HER' %}selected{% endif %}>HER - Hereford</option>
                <option value="BRO" {% if registro.raza == 'BRO' %}selected{% endif %}>BRO - Brown Swiss</option>
                <option value="HOL" {% if registro.raza == 'HOL' %}selected{% endif %}>HOL - Holstein</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Color</label>
            <input type="text" name="color" class="form-control" value="{{ registro.color }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Lote</label>
            <select name="lote" class="form-select">
                <option value="">-- Seleccionar --</option>
                <option value="LOTE - GANADO BRAHMAN" {% if registro.lote == 'LOTE - GANADO BRAHMAN' %}selected{% endif %}>LOTE - GANADO BRAHMAN</option>
                <option value="LOTE - GANADO BRANGUS" {% if registro.lote == 'LOTE - GANADO BRANGUS' %}selected{% endif %}>LOTE - GANADO BRANGUS</option>
                <option value="LOTE - BRANGUS FUNDADORA" {% if registro.lote == 'LOTE - BRANGUS FUNDADORA' %}selected{% endif %}>LOTE - BRANGUS FUNDADORA</option>
                <option value="LOTE - GANADO COMERCIAL" {% if registro.lote == 'LOTE - GANADO COMERCIAL' %}selected{% endif %}>LOTE - GANADO COMERCIAL</option>
                <option value="LOTE - GANADO NELORE" {% if registro.lote == 'LOTE - GANADO NELORE' %}selected{% endif %}>LOTE - GANADO NELORE</option>
                <option value="LOTE - SIN GRUPO" {% if registro.lote == 'LOTE - SIN GRUPO' %}selected{% endif %}>LOTE - SIN GRUPO</option>
                <option value="LOTE - HACIENDA FATIMA" {% if registro.lote == 'LOTE - HACIENDA FATIMA' %}selected{% endif %}>LOTE - HACIENDA FATIMA</option>
                <option value="LOTE - HACIENDA LA PAZ" {% if registro.lote == 'LOTE - HACIENDA LA PAZ' %}selected{% endif %}>LOTE - HACIENDA LA PAZ</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Sector</label>
            <select name="sector" class="form-select">
                <option value="">-- Seleccionar --</option>
                <option value="EQL LA PAZ" {% if registro.sector == 'EQL LA PAZ' %}selected{% endif %}>EQL LA PAZ</option>
                <option value="EQL FATIMA" {% if registro.sector == 'EQL FATIMA' %}selected{% endif %}>EQL FATIMA</option>
                <option value="EQUINOS" {% if registro.sector == 'EQUINOS' %}selected{% endif %}>EQUINOS</option>
                <option value="JEQ LA PAZ" {% if registro.sector == 'JEQ LA PAZ' %}selected{% endif %}>JEQ LA PAZ</option>
                <option value="JEQ FATIMA" {% if registro.sector == 'JEQ FATIMA' %}selected{% endif %}>JEQ FATIMA</option>
            </select>
        </div>
        <div class="col-md-12 mb-3">
            <label class="form-label">Detalle</label>
            <textarea name="detalle" class="form-control" rows="2">{{ registro.detalle }}</textarea>
        </div>
    </div>
    <button type="submit" class="btn btn-success">Guardar cambios</button>
    <a href="{% url 'lista' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
