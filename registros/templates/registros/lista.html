{% extends "registros/base.html" %}

{% block contenido %}
<h2 class="mb-4">Lista de Registros</h2>

<a href="{% url 'agregar' %}" class="btn btn-primary mb-3">+ Agregar Registro</a>

<table id="tabla" class="table table-striped">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Fecha</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for registro in registros %}
        <tr>
            <td>{{ registro.nombre }}</td>
            <td>{{ registro.descripcion }}</td>
            <td>{{ registro.fecha }}</td>
            <td>
            
    <a href="{% url 'editar' registro.id %}" class="btn btn-warning btn-sm">Editar</a>
    <a href="{% url 'eliminar' registro.id %}" class="btn btn-danger btn-sm">Eliminar</a>
</td>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
    $(document).ready(function() {
        $('#tabla').DataTable({
            columnDefs: [
                { orderable: false, targets: -1 }
            ],
            language: {
                url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json'
            }
        });
    });
</script>
{% endblock %}
